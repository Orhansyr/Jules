{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h1 class="mb-0">Contact Us</h1>
            </div>
            <div class="card-body">
                <p>If you have any questions, feel free to reach out to us!</p>
                {% if site_settings.google_maps_embed_url %}
                <div class="mt-4">
                    <div class="embed-responsive embed-responsive-16by9">
                        <iframe class="embed-responsive-item" src="{{ site_settings.google_maps_embed_url }}" allowfullscreen></iframe>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
