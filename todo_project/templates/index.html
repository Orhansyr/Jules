{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h1 class="mb-0">Todo List</h1>
                <button class="btn btn-primary" id="add-todo-btn">Add Todo</button>
            </div>
            <div class="card-body">
                <ul class="list-group" id="todo-list">
                    <!-- Todos will be loaded here by JavaScript -->
                </ul>
            </div>
        </div>
    </div>
</div>

<!-- Todo Modal -->
<div class="modal fade" id="todo-modal" tabindex="-1" aria-labelledby="todo-modal-label" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="todo-modal-label">Add Todo</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="todo-form">
                    <input type="hidden" id="todo-id">
                    <div class="mb-3">
                        <label for="todo-title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="todo-title-input" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="save-todo-btn">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
